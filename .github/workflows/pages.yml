name: pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.page-url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deploy1
        name: Deploy to GitHub Pages (attempt 1)
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before deploy retry 2
        if: steps.deploy1.outcome == 'failure'
        run: sleep 30

      - id: deploy2
        name: Deploy to GitHub Pages (attempt 2)
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before deploy retry 3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 60

      - id: deploy3
        name: Deploy to GitHub Pages (attempt 3)
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v5

      - id: page-url
        name: Resolve deployed Pages URL
        if: always()
        run: |
          url="${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy3.outputs.page_url }}"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Fail if every deploy attempt failed
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure' && steps.deploy3.outcome == 'failure'
        run: exit 1

      - name: Verify public Pages freshness
        run: |
          python - <<'PY'
          import sys
          import time

          from src.pipeline import pages_publish_check

          url = "${{ steps.page-url.outputs.url }}"
          for attempt in range(1, 13):
              result = pages_publish_check.check(url=url, timeout=20)
              print(result)
              if result["status"] == "fresh":
                  sys.exit(0)
              time.sleep(10)

          sys.exit("GitHub Pages blieb nach dem Deploy stale.")
          PY
